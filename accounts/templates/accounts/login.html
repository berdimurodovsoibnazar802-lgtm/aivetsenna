{% extends "base.html" %}
{% block title %}Kirish — Alvitsenna{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="eyebrow">Alvitsenna</div>
    <h2 style="font-size:24px; margin:8px 0 22px;">Hisobingizga kiring</h2>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Login</label>
        {{ form.username }}
      </div>
      <div class="field">
        <label for="id_password">Parol</label>
        {{ form.password }}
      </div>
      {% if form.errors %}
        <div class="error-text">Login yoki parol noto'g'ri.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Kirish</button>
    </form>
    <p style="margin-top:18px; font-size:13px; color:var(--text-muted); text-align:center;">
      Hisobingiz yo'qmi? <a href="{% url 'accounts:register' %}" style="color:var(--teal); font-weight:700;">Ro'yxatdan o'tish</a>
    </p>
  </div>
</div>
{% endblock %}
